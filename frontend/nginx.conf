# nginx.conf — serves the Vite-built frontend and proxies API/WS to the backend.
#
# This file is used inside the frontend Docker container (nginx:alpine).
# It handles three concerns:
#
#   1. SPA routing: any path that isn't a real file falls back to /index.html
#      so React Router can handle client-side navigation.
#
#   2. API proxy (/api/): forwards REST calls to the `backend` service.
#      The hostname `backend` resolves via Docker's internal DNS.
#
#   3. WebSocket proxy (/ws/): forwards WebSocket upgrade requests to the
#      backend.  WebSocket requires HTTP/1.1 + Upgrade header — this is the
#      key difference from the regular API proxy block.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression — reduces JS/CSS transfer size significantly
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain text/css application/json
        application/javascript application/x-javascript
        text/javascript text/xml application/xml
        application/xml+rss image/svg+xml;
    gzip_min_length 1024;

    # ── Static asset caching ──────────────────────────────────────────────
    # Vite hashes asset filenames (e.g. main.abc123.js), so they're safe
    # to cache forever.  The HTML and manifest are not hashed, so no cache.
    location ~* \.(js|css|png|svg|ico|woff|woff2|webmanifest)$ {
        # 1 year cache for hashed assets
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────
    # All paths that don't match a real file get served index.html.
    # React Router then handles the path client-side.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── REST API proxy ────────────────────────────────────────────────────
    # Forward /api/* to the backend FastAPI container.
    # `backend` is the Docker service name — resolved by Docker's DNS.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── WebSocket proxy ───────────────────────────────────────────────────
    # WebSocket connections start as HTTP and "upgrade" to the WS protocol.
    # nginx must:
    #   - Use HTTP/1.1 (HTTP/2 doesn't support upgrades)
    #   - Forward the Upgrade and Connection headers (they're hop-by-hop
    #     headers normally stripped by proxies, so we must pass them explicitly)
    #   - Not time out long-lived idle connections (default 60s would kill
    #     sessions where no scoring events happen for a while)
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Keep WS connections alive for up to 24 hours of inactivity.
        # The client-side ping heartbeat (every 20s) keeps the connection warm.
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
