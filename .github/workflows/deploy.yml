# .github/workflows/deploy.yml
#
# Runs on every push to master. SSH into the VPS, pull the latest code,
# and rebuild/restart the Docker containers.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST     — IP or hostname of the VPS (e.g. 72.62.91.176)
#   VPS_USER     — SSH user (e.g. root)
#   VPS_SSH_KEY  — Full contents of your private key (~/.ssh/id_ed25519)

name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Commands run on the VPS inside the project directory.
          # --build rebuilds images only when source files changed (Docker layer cache).
          script: |
            cd ~/tallymancer
            git pull origin master
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
